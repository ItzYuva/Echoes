version: "3.8"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: echoes-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: echoes-postgres
    environment:
      POSTGRES_DB: echoes
      POSTGRES_USER: echoes
      POSTGRES_PASSWORD: echoes_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  python-api:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: echoes-python
    ports:
      - "8000:8000"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=echoes
      - POSTGRES_USER=echoes
      - POSTGRES_PASSWORD=echoes_dev
      - AGENT_ENABLED=${AGENT_ENABLED:-true}
      - REDDIT_CLIENT_ID=${REDDIT_CLIENT_ID:-}
      - REDDIT_CLIENT_SECRET=${REDDIT_CLIENT_SECRET:-}
    depends_on:
      - qdrant
      - postgres
    restart: unless-stopped

  spring-api:
    build: ./echoes-api
    container_name: echoes-api
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/echoes
      - SPRING_DATASOURCE_USERNAME=echoes
      - SPRING_DATASOURCE_PASSWORD=echoes_dev
      - ECHOES_PYTHON_API_BASE_URL=http://python-api:8000
      - AUTH_TOKEN_SECRET=${AUTH_TOKEN_SECRET:-echoes-prod-secret-change-me}
    depends_on:
      - postgres
      - python-api
    restart: unless-stopped

  frontend:
    build: ./echoes-frontend
    container_name: echoes-frontend
    ports:
      - "4200:80"
    depends_on:
      - spring-api
    restart: unless-stopped

volumes:
  qdrant_storage:
    driver: local
  postgres_data:
    driver: local
