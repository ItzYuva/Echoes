version: "3.8"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: echoes-qdrant
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: echoes-postgres
    environment:
      POSTGRES_DB: echoes
      POSTGRES_USER: echoes
      POSTGRES_PASSWORD: echoes_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  qdrant_storage:
    driver: local
  postgres_data:
    driver: local
